<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>
</head>
<body>

<h1>My Cart</h1>

{% for item in cart %}

<h3>{{ item.name }}</h3>

<p>Price: ₹{{ item.price }}</p>

<hr>

{% endfor %}

<br>

<a href="/checkout">
    <button>Proceed To Checkout</button>
</a>

</body>
</html>
